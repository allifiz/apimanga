name: Deploy apimanga to Azure VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.AZURE_APP_PATH }}

            echo "Pull latest code..."
            git pull origin main

            echo "Install production dependencies..."
            npm install --omit=dev

                       echo "Restart PM2 app..."
            pm2 restart apimanga --update-env || pm2 start src/server.js --name apimanga --max-memory-restart 350M

            echo "Save PM2 process list..."
            pm2 save

            echo "Health check..."
            for i in {1..10}; do
              if curl -f http://127.0.0.1:4000/health; then
                echo "Health check passed"
                exit 0
              fi

              echo "Waiting for app to be ready... attempt $i"
              sleep 2
            done

            echo "Health check failed"
            pm2 logs apimanga --lines 50 --nostream
            exit 1
