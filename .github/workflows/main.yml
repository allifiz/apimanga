name: Deploy apimanga to Azure VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.AZURE_APP_PATH }}

            echo "Pull latest code..."
            git pull origin main

            echo "Install production dependencies..."
            npm install --omit=dev

            echo "Restart PM2 app..."
            pm2 restart apimanga || pm2 start src/server.js --name apimanga --max-memory-restart 350M

            echo "Save PM2 process list..."
            pm2 save

            echo "Health check..."
            curl -f http://127.0.0.1:4000/health
